<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Charity Stream — Tutorial</title>
<style>
  html, body { height:100%; margin:0; }
  body { background:#000; color:#fff; font-family:system-ui,-apple-system,Segoe UI,Inter,Roboto,Arial; }

  /* Header bar */
  .nav-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .nav-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.01em;
  }
  .nav-hint .sep {
    opacity: 0.35;
    margin: 0 6px;
  }
  .nav-hint kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.4);
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    color: #fff;
    min-width: 28px;
  }
  .nav-hint .label {
    opacity: 0.8;
    font-weight: 400;
  }
  .nav-counter {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
  }

  /* Image stage */
  .stage {
    position: fixed;
    inset: 0;
    top: 58px; /* below nav bar */
    display: grid;
    place-items: center;
    padding: 20px;
  }
  .frame {
    position: relative;
    width: min(88vw, 1050px);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  .shot {
    display: block;
    width: 100%;
    height: auto;
  }

  /* Crossfade overlay */
  .shot-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: auto;
    pointer-events: none;
    opacity: 0;
    transition: opacity 300ms ease;
  }
</style>
</head>
<body>

<div class="nav-bar">
  <span class="nav-hint">
    <kbd>←</kbd> <kbd>→</kbd> <span class="label">navigate</span>
    <span class="sep">|</span>
    <kbd>Esc</kbd> <span class="label">exit tutorial</span>
  </span>
  <span class="nav-counter" id="counter">1 / 9</span>
</div>

<div class="stage">
  <div class="frame">
    <img id="shot" class="shot" alt="Tutorial step" />
    <img id="shotOverlay" class="shot-overlay" alt="" aria-hidden="true" />
  </div>
</div>

<script>
const slides = [
  "tutorial/Wireframe - 2.png",
  "tutorial/Wireframe - 3.png",
  "tutorial/Wireframe - 4.png",
  "tutorial/Wireframe - 5.png",
  "tutorial/Wireframe - 6.png",
  "tutorial/Wireframe - 7.png",
  "tutorial/Wireframe - 8.png",
  "tutorial/Wireframe - 9.png",
  "tutorial/Wireframe - 10.png",
];

const img     = document.getElementById("shot");
const overlay = document.getElementById("shotOverlay");
const counter = document.getElementById("counter");

// Preload all slides
slides.forEach(src => { const t = new Image(); t.src = src; });

let i = 0;

function closeTutorial() {
  localStorage.setItem('charityStream_tutorialSeen', 'true');
  localStorage.removeItem('charityStream_newUser');
  window.location.href = '/';
}

function fadeTo(src) {
  overlay.src = src;
  overlay.style.opacity = 0;
  const tmp = new Image();
  tmp.onload = () => {
    requestAnimationFrame(() => { overlay.style.opacity = 1; });
    setTimeout(() => {
      img.src = src;
      overlay.style.opacity = 0;
    }, 300);
  };
  tmp.src = src;
}

function render() {
  fadeTo(slides[i]);
  counter.textContent = `${i + 1} / ${slides.length}`;
}

window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") {
    if (i === slides.length - 1) {
      closeTutorial();
    } else {
      i++;
      render();
    }
  } else if (e.key === "ArrowLeft") {
    if (i > 0) {
      i--;
      render();
    }
  } else if (e.key === "Escape") {
    closeTutorial();
  }
});

render();
</script>
</body>
</html>
