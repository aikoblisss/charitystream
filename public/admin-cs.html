<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-view {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 40px 48px;
      width: 360px;
    }
    .login-card h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 28px;
      color: #f8fafc;
      letter-spacing: -.3px;
    }
    .login-card h1 span { color: #4ade80; }
    .login-card input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color .15s;
    }
    .login-card input:focus { border-color: #4ade80; }
    .login-card button[type="submit"] {
      width: 100%;
      background: #4ade80;
      color: #0f1117;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background .15s;
    }
    .login-card button[type="submit"]:hover { background: #22c55e; }
    .login-card button[type="submit"]:disabled { background: #166534; color: #4ade8080; cursor: not-allowed; }
    #login-error {
      color: #f87171;
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
    }

    /* ── Admin layout ── */
    #admin-view { display: none; min-height: 100vh; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid #1e2235;
      background: #13151f;
    }
    header .brand { font-size: 15px; font-weight: 600; color: #f8fafc; }
    header .brand span { color: #4ade80; }
    #logout-btn {
      background: none;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #94a3b8;
      font-size: 13px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    #logout-btn:hover { border-color: #f87171; color: #f87171; }

    .main-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 4px;
      width: fit-content;
    }
    .tab-btn {
      background: none;
      border: none;
      color: #64748b;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .tab-btn.active {
      background: #2d3148;
      color: #f8fafc;
    }
    .tab-btn:hover:not(.active) { color: #cbd5e1; }

    /* Count badge on tabs */
    .tab-badge {
      display: inline-block;
      background: #374151;
      color: #9ca3af;
      font-size: 11px;
      font-weight: 600;
      border-radius: 10px;
      padding: 1px 7px;
      margin-left: 6px;
    }
    .tab-btn.active .tab-badge { background: #4ade8030; color: #4ade80; }

    /* ── Table card ── */
    .table-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      overflow: hidden;
    }
    .table-card table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    .table-card th {
      text-align: left;
      padding: 12px 16px;
      color: #64748b;
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid #2d3148;
      background: #13151f;
    }
    .table-card td {
      padding: 13px 16px;
      border-bottom: 1px solid #1e2235;
      vertical-align: middle;
      color: #cbd5e1;
    }
    .table-card tr:last-child td { border-bottom: none; }
    .table-card tr:hover td { background: #1e2235; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #475569;
      font-size: 14px;
    }

    /* ── Inline badges ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-yes { background: #14532d30; color: #4ade80; }
    .badge-no  { background: #1e293b; color: #475569; }

    /* ── Buttons ── */
    .btn {
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-approve { background: #14532d; color: #4ade80; }
    .btn-approve:hover:not(:disabled) { background: #166534; }
    .btn-reject  { background: #450a0a; color: #f87171; margin-left: 6px; }
    .btn-reject:hover:not(:disabled)  { background: #7f1d1d; }
    .btn-video   { background: #1e293b; color: #7dd3fc; }
    .btn-video:hover:not(:disabled)   { background: #334155; }

    .action-cell { white-space: nowrap; }

    /* Spinning indicator on row during processing */
    .processing-row td { opacity: .5; }
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid #4ade8040;
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Sub-tabs (inside charities panel) */
    .sub-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #2d3148;
      background: #13151f;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
    }
    .sub-tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #64748b;
      font-size: 13px;
      font-weight: 500;
      padding: 12px 20px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      margin-bottom: -1px;
    }
    .sub-tab-btn.active { color: #f8fafc; border-bottom-color: #4ade80; }
    .sub-tab-btn:hover:not(.active) { color: #cbd5e1; }

    /* Winner row highlight */
    .winner-row td { background: #14532d20 !important; }
    .winner-row td:first-child { border-left: 3px solid #4ade80; }

    /* Winner already selected banner */
    .winner-banner {
      padding: 10px 16px;
      background: #14532d30;
      border-bottom: 1px solid #166534;
      color: #4ade80;
      font-size: 13px;
      font-weight: 500;
    }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(2px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    .modal-box {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 28px 32px;
      width: 380px;
      max-width: 90vw;
    }
    .modal-box h3 {
      font-size: 16px;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 8px;
    }
    .modal-box p {
      font-size: 13.5px;
      color: #94a3b8;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .modal-box p strong { color: #f8fafc; }
    .modal-box input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .15s;
    }
    .modal-box input:focus { border-color: #4ade80; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    #modal-cancel-btn {
      background: #1e293b;
      color: #94a3b8;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 13px;
      cursor: pointer;
    }
    #modal-cancel-btn:hover { background: #334155; }
    #modal-confirm-btn {
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    #modal-confirm-btn:disabled { opacity: .4; cursor: not-allowed; }
    #modal-confirm-btn.approve { background: #4ade80; color: #0f1117; }
    #modal-confirm-btn.reject  { background: #f87171; color: #0f1117; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 13.5px;
      color: #e2e8f0;
      z-index: 200;
      max-width: 340px;
      transform: translateY(20px);
      opacity: 0;
      transition: transform .2s, opacity .2s;
      pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-left: 3px solid #4ade80; }
    #toast.error   { border-left: 3px solid #f87171; }
    #toast.info    { border-left: 3px solid #7dd3fc; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-view">
  <div class="login-card">
    <h1><span>Charity</span> Stream Admin</h1>
    <form id="login-form">
      <input type="text" id="username-input" placeholder="Username" autocomplete="username" required>
      <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" required>
      <button type="submit" id="login-btn">Sign In</button>
    </form>
    <p id="login-error"></p>
  </div>
</div>

<!-- Admin view -->
<div id="admin-view">
  <header>
    <span class="brand"><span>Charity</span> Stream Admin</span>
    <button id="logout-btn">Logout</button>
  </header>
  <div class="main-content">
    <div class="tabs">
      <button class="tab-btn active" data-tab="advertisers">
        Advertisers <span class="tab-badge" id="badge-advertisers">0</span>
      </button>
      <button class="tab-btn" data-tab="sponsors">
        Sponsors <span class="tab-badge" id="badge-sponsors">0</span>
      </button>
      <button class="tab-btn" data-tab="charities">
        Charities <span class="tab-badge" id="badge-charities">0</span>
      </button>
    </div>

    <!-- Advertisers table -->
    <div id="tab-advertisers" class="table-card">
      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>Expedited</th>
            <th>CPM Rate</th>
            <th>Budget Cap</th>
            <th>Website</th>
            <th>Media</th>
            <th>Click URL</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="advertisers-tbody">
          <tr><td colspan="8" class="empty-state">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Sponsors table -->
    <div id="tab-sponsors" class="table-card" style="display:none">
      <table>
        <thead>
          <tr>
            <th>Logo</th>
            <th>Organization</th>
            <th>Website</th>
            <th>EIN</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="sponsors-tbody">
          <tr><td colspan="5" class="empty-state">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Charities panel (with sub-tabs) -->
    <div id="tab-charities" style="display:none">
      <div class="table-card">
        <div class="sub-tabs">
          <button class="sub-tab-btn active" data-subtab="approve">Approve</button>
          <button class="sub-tab-btn" data-subtab="winner">Select Winner</button>
        </div>

        <!-- Approve sub-panel -->
        <div id="charities-approve-panel">
          <table>
            <thead>
              <tr>
                <th>Charity Name</th>
                <th>Federal EIN</th>
                <th>Contact Email</th>
                <th style="text-align:right">Actions</th>
              </tr>
            </thead>
            <tbody id="charities-tbody">
              <tr><td colspan="4" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Select Winner sub-panel -->
        <div id="charities-winner-panel" style="display:none">
          <div id="winner-banner" class="winner-banner" style="display:none"></div>
          <table>
            <thead>
              <tr>
                <th>Charity Name</th>
                <th>Federal EIN</th>
                <th>Contact Email</th>
                <th style="text-align:right">Select</th>
              </tr>
            </thead>
            <tbody id="winner-tbody">
              <tr><td colspan="4" class="empty-state">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Confirmation modal -->
<div id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-title"></h3>
    <p id="modal-body"></p>
    <input type="text" id="modal-input" placeholder="">
    <div class="modal-actions">
      <button id="modal-cancel-btn">Cancel</button>
      <button id="modal-confirm-btn" disabled>Confirm</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
(function () {
  'use strict';

  var token = sessionStorage.getItem('admin_token') || null;
  var activeTab = 'advertisers';
  var activeCharitySubTab = 'approve';

  // ── Helpers ──────────────────────────────────────────────

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function api(method, url, body) {
    var opts = {
      method: method,
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);
    return fetch(url, opts).then(function (r) {
      return r.json().then(function (data) {
        if (!r.ok) throw new Error(data.error || r.statusText);
        return data;
      });
    });
  }

  var _toastTimer = null;
  function showToast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + (type || 'info');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function () { el.className = ''; }, 3500);
  }

  function showAdmin() {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('admin-view').style.display = 'block';
    loadTab('advertisers');
    loadTab('sponsors');
    loadTab('charities');
    loadWinnerEligible();
  }

  // Auto-restore session on page load
  if (token) {
    // Verify token is still valid with a lightweight API call
    api('GET', '/api/admin/charities').then(function () {
      showAdmin();
    }).catch(function () {
      token = null;
      sessionStorage.removeItem('admin_token');
    });
  }

  // ── Auth ─────────────────────────────────────────────────

  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var btn = document.getElementById('login-btn');
    var errEl = document.getElementById('login-error');
    var username = document.getElementById('username-input').value.trim();
    var password = document.getElementById('password-input').value;
    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    fetch('/admin-cs/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
      .then(function (res) {
        if (!res.ok) throw new Error(res.data.error || 'Login failed');
        token = res.data.token;
        sessionStorage.setItem('admin_token', token);
        showAdmin();
      })
      .catch(function (err) {
        errEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Sign In';
      });
  });

  document.getElementById('logout-btn').addEventListener('click', function () {
    token = null;
    sessionStorage.removeItem('admin_token');
    document.getElementById('admin-view').style.display = 'none';
    document.getElementById('login-view').style.display = 'flex';
    document.getElementById('password-input').value = '';
    document.getElementById('login-error').textContent = '';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Sign In';
  });

  // ── Tabs ─────────────────────────────────────────────────

  document.querySelectorAll('.tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeTab = btn.dataset.tab;
      document.getElementById('tab-advertisers').style.display = activeTab === 'advertisers' ? '' : 'none';
      document.getElementById('tab-sponsors').style.display   = activeTab === 'sponsors'    ? '' : 'none';
      document.getElementById('tab-charities').style.display  = activeTab === 'charities'   ? '' : 'none';
    });
  });

  // Sub-tabs within charities
  document.querySelectorAll('.sub-tab-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.sub-tab-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeCharitySubTab = btn.dataset.subtab;
      document.getElementById('charities-approve-panel').style.display = activeCharitySubTab === 'approve' ? '' : 'none';
      document.getElementById('charities-winner-panel').style.display  = activeCharitySubTab === 'winner'  ? '' : 'none';
    });
  });

  // ── Load data ────────────────────────────────────────────

  function loadTab(tab) {
    api('GET', '/api/admin/' + tab).then(function (rows) {
      document.getElementById('badge-' + tab).textContent = rows.length;
      if (tab === 'advertisers') renderAdvertisers(rows);
      if (tab === 'sponsors')    renderSponsors(rows);
      if (tab === 'charities')   renderCharities(rows);
    }).catch(function (err) {
      var mapCols = { advertisers: 8, sponsors: 5, charities: 4 };
      var tbodyId = tab === 'advertisers' ? 'advertisers-tbody' : tab === 'sponsors' ? 'sponsors-tbody' : 'charities-tbody';
      document.getElementById(tbodyId)
        .innerHTML = '<tr><td colspan="' + mapCols[tab] + '" class="empty-state" style="color:#f87171">' + esc(err.message) + '</td></tr>';
    });
  }

  function loadWinnerEligible() {
    api('GET', '/api/admin/charities/winner-eligible').then(function (data) {
      renderWinner(data);
    }).catch(function (err) {
      document.getElementById('winner-tbody').innerHTML =
        '<tr><td colspan="4" class="empty-state" style="color:#f87171">' + esc(err.message) + '</td></tr>';
    });
  }

  function renderAdvertisers(rows) {
    var tbody = document.getElementById('advertisers-tbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No pending advertisers</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function (r) {
      var mediaBtn = r.media_r2_link
        ? '<a href="' + esc(r.media_r2_link) + '" target="_blank" class="btn btn-video" style="text-decoration:none">View Media</a>'
        : '<span style="color:#475569;font-size:12px">—</span>';
      var clickCell = (r.click_tracking && r.destination_url)
        ? '<a href="' + esc(r.destination_url) + '" target="_blank" style="color:#7dd3fc;text-decoration:none;font-size:12px;word-break:break-all">' + esc(r.destination_url) + '</a>'
        : '<span style="color:#475569;font-size:12px">—</span>';
      var cpmCell = r.cpm_rate != null ? '$' + parseFloat(r.cpm_rate).toFixed(2) : '<span style="color:#475569;font-size:12px">—</span>';
      var budgetCell = r.weekly_budget_cap != null ? '$' + parseFloat(r.weekly_budget_cap).toFixed(2) : '<span style="color:#475569;font-size:12px">—</span>';
      return '<tr id="adv-row-' + r.id + '">' +
        '<td><strong>' + esc(r.company_name) + '</strong></td>' +
        '<td><span class="badge ' + (r.expedited ? 'badge-yes' : 'badge-no') + '">' + (r.expedited ? 'Yes' : 'No') + '</span></td>' +
        '<td>' + cpmCell + '</td>' +
        '<td>' + budgetCell + '</td>' +
        '<td>' + (r.website_url ? '<a href="' + esc(r.website_url) + '" target="_blank" style="color:#7dd3fc;text-decoration:none">' + esc(r.website_url) + '</a>' : '—') + '</td>' +
        '<td>' + mediaBtn + '</td>' +
        '<td>' + clickCell + '</td>' +
        '<td class="action-cell" style="text-align:right">' +
          '<button class="btn btn-approve" onclick="confirmAction(\'approve\',\'advertisers\',' + r.id + ',\'' + esc(r.company_name) + '\')">Approve</button>' +
          '<button class="btn btn-reject"  onclick="confirmAction(\'reject\', \'advertisers\',' + r.id + ',\'' + esc(r.company_name) + '\')">Reject</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  function renderSponsors(rows) {
    var tbody = document.getElementById('sponsors-tbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No pending sponsors</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function (r) {
      var logoCell = r.logo_url
        ? '<a href="' + esc(r.logo_url) + '" target="_blank" style="color:#7dd3fc;text-decoration:none;font-size:13px">View Logo</a>'
        : '<span style="color:#475569;font-size:12px">—</span>';
      return '<tr id="sp-row-' + r.id + '">' +
        '<td>' + logoCell + '</td>' +
        '<td><strong>' + esc(r.organization_legal_name) + '</strong></td>' +
        '<td>' + (r.website ? '<a href="' + esc(r.website) + '" target="_blank" style="color:#7dd3fc;text-decoration:none">' + esc(r.website) + '</a>' : '—') + '</td>' +
        '<td style="font-family:monospace;font-size:12px">' + esc(r.ein_tax_id || '—') + '</td>' +
        '<td class="action-cell" style="text-align:right">' +
          '<button class="btn btn-approve" onclick="confirmAction(\'approve\',\'sponsors\',\'' + esc(r.id) + '\',\'' + esc(r.organization_legal_name) + '\')">Approve</button>' +
          '<button class="btn btn-reject"  onclick="confirmAction(\'reject\', \'sponsors\',\'' + esc(r.id) + '\',\'' + esc(r.organization_legal_name) + '\')">Reject</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  function renderCharities(rows) {
    var tbody = document.getElementById('charities-tbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No pending charities this week</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function (r) {
      return '<tr id="ch-row-' + r.id + '">' +
        '<td><strong>' + esc(r.charity_name) + '</strong></td>' +
        '<td style="font-family:monospace;font-size:12px">' + esc(r.federal_ein || '—') + '</td>' +
        '<td>' + esc(r.contact_email || '—') + '</td>' +
        '<td class="action-cell" style="text-align:right">' +
          '<button class="btn btn-approve" onclick="confirmAction(\'approve\',\'charities\',\'' + esc(r.id) + '\',\'' + esc(r.charity_name) + '\')">Approve</button>' +
          '<button class="btn btn-reject"  onclick="confirmAction(\'reject\', \'charities\',\'' + esc(r.id) + '\',\'' + esc(r.charity_name) + '\')">Reject</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  function renderWinner(data) {
    var tbody = document.getElementById('winner-tbody');
    var banner = document.getElementById('winner-banner');
    var hasWinner = Boolean(data.winnerId);

    // Banner
    if (hasWinner) {
      banner.style.display = '';
      banner.textContent = 'Winner for ' + data.nextWeekStart + ' already selected.';
    } else {
      banner.style.display = 'none';
    }

    if (!data.charities || !data.charities.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No approved charities in the pool for ' + esc(data.nextWeekStart) + '</td></tr>';
      return;
    }

    tbody.innerHTML = data.charities.map(function (r) {
      var isWinner = hasWinner && r.id === data.winnerId;
      var btnHtml = hasWinner
        ? '<button class="btn btn-approve" disabled style="opacity:.35;cursor:not-allowed">Select</button>'
        : '<button class="btn btn-approve" onclick="confirmAction(\'select-winner\',\'charities\',\'' + esc(r.id) + '\',\'' + esc(r.charity_name) + '\')">Select</button>';
      return '<tr id="ch-win-row-' + r.id + '" class="' + (isWinner ? 'winner-row' : '') + '">' +
        '<td><strong>' + esc(r.charity_name) + '</strong></td>' +
        '<td style="font-family:monospace;font-size:12px">' + esc(r.federal_ein || '—') + '</td>' +
        '<td>' + esc(r.contact_email || '—') + '</td>' +
        '<td class="action-cell" style="text-align:right">' + btnHtml + '</td>' +
      '</tr>';
    }).join('');
  }

  // ── Confirmation modal ───────────────────────────────────

  var _pending = null;

  function actionWord(action) {
    if (action === 'approve') return 'approve';
    if (action === 'select-winner') return 'select';
    return 'reject';
  }

  window.confirmAction = function (action, type, id, name) {
    _pending = { action: action, type: type, id: id, name: name };
    var word = actionWord(action);
    var isApprove = action === 'approve' || action === 'select-winner';

    var titlePrefix = action === 'select-winner' ? 'Select Winner' : (isApprove ? 'Approve' : 'Reject');
    var warningNote = (type === 'sponsors' && action === 'approve')
      ? '<br><br>Note: sponsor approval generates a video via FFmpeg and may take a few minutes.'
      : '';

    document.getElementById('modal-title').textContent = titlePrefix + ' — ' + name;
    document.getElementById('modal-body').innerHTML =
      'Type <strong>' + word + '</strong> to confirm this action.' + warningNote;
    document.getElementById('modal-input').value = '';
    document.getElementById('modal-input').placeholder = 'Type "' + word + '" to confirm';

    var confirmBtn = document.getElementById('modal-confirm-btn');
    confirmBtn.textContent = action === 'select-winner' ? 'Select' : (isApprove ? 'Approve' : 'Reject');
    confirmBtn.className = isApprove ? 'approve' : 'reject';
    confirmBtn.disabled = true;

    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(function () { document.getElementById('modal-input').focus(); }, 50);
  };

  document.getElementById('modal-input').addEventListener('input', function () {
    var word = _pending ? actionWord(_pending.action) : 'approve';
    document.getElementById('modal-confirm-btn').disabled = this.value.trim() !== word;
  });

  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);

  document.getElementById('modal-overlay').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    _pending = null;
  }

  document.getElementById('modal-confirm-btn').addEventListener('click', function () {
    if (!_pending || this.disabled) return;
    var p = _pending;
    closeModal();
    runAction(p.action, p.type, p.id, p.name);
  });

  // ── Run action ───────────────────────────────────────────

  function rowPrefix(type) {
    if (type === 'advertisers') return 'adv';
    if (type === 'sponsors')    return 'sp';
    return 'ch';
  }

  function runAction(action, type, id, name) {
    // Winner selection uses a different row id prefix and different post-action
    var isWinnerSelect = action === 'select-winner';
    var rowId = isWinnerSelect ? ('ch-win-row-' + id) : (rowPrefix(type) + '-row-' + id);
    var row = document.getElementById(rowId);

    if (row) {
      row.classList.add('processing-row');
      row.querySelectorAll('button').forEach(function (b) { b.disabled = true; });
      var actionCell = row.querySelector('.action-cell');
      if (actionCell) {
        actionCell.innerHTML = '<span class="spinner"></span><span style="color:#94a3b8;font-size:13px">' +
          (action === 'approve' && type === 'sponsors' ? 'Generating video...' : 'Processing...') + '</span>';
      }
    }

    api('POST', '/api/admin/' + type + '/' + id + '/' + action)
      .then(function () {
        if (isWinnerSelect) {
          showToast(name + ' selected as winner.', 'success');
          loadWinnerEligible(); // reload winner panel to show locked state
        } else {
          showToast(name + ' ' + action + 'd successfully.', 'success');
          if (row) row.remove();
          var badge = document.getElementById('badge-' + type);
          if (badge) badge.textContent = Math.max(0, parseInt(badge.textContent, 10) - 1);
          var tbodyMap = { advertisers: 'advertisers-tbody', sponsors: 'sponsors-tbody', charities: 'charities-tbody' };
          var colMap   = { advertisers: 8, sponsors: 5, charities: 4 };
          var tbody = document.getElementById(tbodyMap[type]);
          if (tbody && tbody.querySelectorAll('tr').length === 0) {
            tbody.innerHTML = '<tr><td colspan="' + (colMap[type] || 4) + '" class="empty-state">No pending ' + type + '</td></tr>';
          }
        }
      })
      .catch(function (err) {
        showToast('Error: ' + err.message, 'error');
        if (isWinnerSelect) {
          loadWinnerEligible();
        } else if (row) {
          row.classList.remove('processing-row');
          loadTab(type);
        }
      });
  }

})();
</script>
</body>
</html>
